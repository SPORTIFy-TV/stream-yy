            throw new Error('Key file not found');
        }

    })
    .then(jsonData => {

        // ৩. ডিক্রিপশন প্রসেস (CryptoJS Logic)

            {ciphertext: CryptoJS.enc.Base64.parse(data)},
            CryptoJS.enc.Utf8.parse(key),
            {mode: CryptoJS.mode.ECB, padding: CryptoJS.pad.Pkcs7}
        );

        // ৪. আউটপুট প্রদর্শন
        var finalResult = decrypted.toString(CryptoJS.enc.Utf8);
        if (finalResult) {
            document.write(finalResult);
        } else {
            document.write("Error: Decryption failed. Please check your key.json.");
        }
    })
    .catch(error => {
        console.error('Error:', error);
        document.write("Error: Could not load the decryption key.");
    });
