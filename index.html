<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stream Player + Debug</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<style>
html, body {
  margin: 0;
  background: #000;
  font-family: monospace;
}

#playerWrapper {
  height: 65vh;
  width: 100%;
}

video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
}

#debugBox {
  height: 35vh;
  background: #111;
  color: #00ff88;
  overflow: auto;
  padding: 10px;
  font-size: 12px;
  border-top: 2px solid #00ff88;
}
</style>
</head>

<body>

<div id="playerWrapper">
  <video id="video" controls playsinline autoplay></video>
</div>

<div id="debugBox">🔍 Debug Log Started...<br></div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const videoUrl = urlParams.get("url");

// 🔥 তোমার Proxy
const proxyBase = "https://mini.allinonereborn.fun/events/stream_proxy.php?url=";

const video = document.getElementById("video");
const debugBox = document.getElementById("debugBox");

function log(msg) {
  debugBox.innerHTML += msg + "<br>";
  debugBox.scrollTop = debugBox.scrollHeight;
}

if (!videoUrl) {
  log("❌ No stream URL provided.");
}

const finalUrl = proxyBase + encodeURIComponent(videoUrl);
log("📡 Original URL: " + videoUrl);
log("📡 Proxy URL: " + finalUrl);

if (Hls.isSupported()) {

  const hls = new Hls({
    enableWorker: true,
    lowLatencyMode: true,
    maxBufferLength: 30
  });

  log("🚀 Loading manifest...");
  hls.loadSource(finalUrl);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_LOADING, () => {
    log("📥 Manifest loading...");
  });

  hls.on(Hls.Events.MANIFEST_PARSED, function (event, data) {
    log("✅ Manifest loaded. Quality levels: " + data.levels.length);
    video.play();
  });

  hls.on(Hls.Events.LEVEL_LOADING, (event, data) => {
    log("📦 Loading level: " + data.level);
  });

  hls.on(Hls.Events.FRAG_LOADING, (event, data) => {
    log("⬇ Segment loading: " + data.frag.url);
  });

  hls.on(Hls.Events.ERROR, function(event, data) {
    log("❌ HLS ERROR:");
    log("Type: " + data.type);
    log("Details: " + data.details);
    log("Fatal: " + data.fatal);
  });

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = finalUrl;
}

const player = new Plyr(video, {
  autoplay: true,
  controls: [
    'play-large',
    'play',
    'progress',
    'current-time',
    'mute',
    'volume',
    'settings',
    'fullscreen'
  ]
});
</script>

</body>
</html>
