<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Live Sports Player - Direct URL</title>
  <script src="https://cdn.jwplayer.com/libraries/IDzF9Zmk.js"></script>
  <style>
    /* বেস লেআউট */
    html, body { margin: 0; height: 100%; background: black; overflow: hidden; }
    
    #player-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
    #player { width: 100%; height: 100%; }

    /* লোডিং ডিজাইন */
    #loading-overlay { position: absolute; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); display:flex; flex-direction:column; justify-content:center; align-items:center; z-index:999999; color:white; font-family:Arial; text-align:center; padding: 20px;}
    .spinner { width:50px; height:50px; border:5px solid rgba(255,255,255,0.1); border-top-color:#e94560; border-radius:50%; animation:spin 1s linear infinite; margin-bottom:15px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    /* কোয়ালিটি মেনু ডিজাইন */
    .jw-quality-selector { 
      position:absolute; bottom:60px; right:20px; background:rgba(30, 30, 30, 0.95); 
      border-radius:5px; z-index:99999999; display:none; font-family:Arial, sans-serif; 
      min-width:160px; box-shadow:0 5px 20px rgba(0,0,0,0.9); overflow: hidden;
    }
    .jw-quality-selector.show { display:block; }
    .jw-quality-item { 
      padding:12px 20px 12px 45px; color:#d1d1d1; cursor:pointer; font-size:14px; 
      text-align:right; border-bottom:1px solid #333; position:relative; 
    }
    .jw-quality-item:last-child { border-bottom:none; }
    .jw-quality-item:hover { background:#444; color:white; }
    .jw-quality-item.active { background:#f04360; color:white; font-weight:bold; }
    .jw-quality-item.active::before { content:'✓'; position:absolute; left:15px; color:white; font-size: 16px; }
    
    #quality-loading { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.8); color:white; padding:10px 20px; border-radius:30px; font-size:14px; z-index:99999; display:none; font-family:Arial; border:1px solid rgba(255,255,255,0.2); }
  </style>
</head>
<body>

  <div id="loading-overlay"><div class="spinner"></div><div id="loading-text">Loading Stream...</div></div>
  <div id="quality-loading">Switching quality...</div>

  <!-- প্লেয়ার সেকশন -->
  <div id="player-container">
    <div id="player"></div>
  </div>
  
  <div id="quality-selector" class="jw-quality-selector"></div>

  <script>
    // URL থেকে ?play= এর ভ্যালু নেওয়া
    const urlParams = new URLSearchParams(window.location.search);
    const streamUrl = urlParams.get('play');

    let player = null;
    let currentQuality = '';
    let qualityUrls = [];

    function showLoading(s, t="Loading...") {
      const overlay = document.getElementById('loading-overlay');
      const spinner = overlay.querySelector('.spinner');
      overlay.style.display = s ? 'flex' : 'none';
      if(s) {
        document.getElementById('loading-text').innerText = t;
        if(t.includes("Error") || t.includes("provide")) {
          spinner.style.display = 'none';
        } else {
          spinner.style.display = 'block';
        }
      }
    }

    // লিংক থেকে অটোমেটিক কোয়ালিটি লিস্ট জেনারেট করা
    function generateStreamsFromUrl(url) {
      const qMap = {'1080p':6, '720p':5, '540p':4, '480p':3, '360p':2, '240p':1};
      const qualities = ['1080p', '720p', '540p', '480p', '360p', '240p'];
      let streams = [];
      
      const match = url.match(/(1080p|720p|540p|480p|360p|240p|master)\.m3u8/i);
      if(match) {
        let replaceTarget = match[1] + '.m3u8';
        qualities.forEach(q => {
          let newUrl = url.replace(replaceTarget, q + '.m3u8');
          streams.push({url: newUrl, quality: q, order: qMap[q]});
        });
      } else {
        streams.push({url: url, quality: 'Auto', order: 1});
      }
      return streams.sort((a,b) => b.order - a.order);
    }

    function buildMenu() {
      const sel = document.getElementById('quality-selector');
      sel.innerHTML = '';
      qualityUrls.forEach(s => {
        const div = document.createElement('div');
        div.className = 'jw-quality-item';
        if(s.quality === currentQuality) div.classList.add('active');
        div.innerText = s.quality;
        div.onclick = (e) => { 
          e.stopPropagation(); 
          changeQuality(s.url, s.quality); 
          sel.classList.remove('show'); 
        };
        sel.appendChild(div);
      });
    }

    function changeQuality(url, label) {
      currentQuality = label;
      buildMenu();
      document.getElementById('quality-loading').style.display = 'block';
      const pos = player.getPosition();
      
      // প্রোডক্ট ইউআরএল সরাসরি ব্যবহার করা হচ্ছে (প্রক্সি ছাড়া)
      player.load([{ file: url, label: label, type: 'hls' }]);
      player.once('play', () => {
        document.getElementById('quality-loading').style.display = 'none';
        if(pos > 0) player.seek(pos);
      });
    }

    // পেজ লোড হওয়ার সাথে সাথে এই ফাংশনটি রান করবে
    function initPlayer() {
      if(!streamUrl) {
        return showLoading(true, "No stream URL provided.\nUse ?play=YOUR_M3U8_LINK in the URL.");
      }

      showLoading(true, "Loading Player...");

      try {
        qualityUrls = generateStreamsFromUrl(streamUrl);
        const def = qualityUrls[0];
        currentQuality = def.quality;
        buildMenu();

        // JW Player Setup (সরাসরি ইউআরএল ব্যবহার)
        player = jwplayer('player').setup({
          file: def.url,
          type: 'hls', 
          autostart: true,
          mute: false,
          width: '100%',
          height: '100%',
          stretching: 'uniform',
          controls: true,
          primary: 'html5',
          hlshtml: true
        });

        player.on('ready', () => {
          showLoading(false);
          
          // Fullscreen Bug Fix
          const playerDiv = document.getElementById('player');
          const qualityMenu = document.getElementById('quality-selector');
          if (playerDiv && qualityMenu) {
            playerDiv.appendChild(qualityMenu);
          }
          
          const gearSvg = "data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAyNCAyNCI+PHBhdGggZmlsbD0id2hpdGUiIGQ9Ik0xOS40IDEzYy4xLS42LjEtMS4zIDAtMS45bDIuMS0xLjZjLjOzLS4yLjMtLjUuMS0uNy0yLTMuNWMtLjItLjMtLjUtLjQtLjgtLjNsLTIuNSAxYy0uNS0uNC0xLjEtLjctMS43LTFsLS40LTIuNmMwLS4zLS4zLS41LS42LS41aC00Yy0uMyAwLS42LjItLjYuNWwtLjQgMi42Yy0uNi4zLTEuMi42LTEuNyAxbC0yLjUtMWMtLjMtLjEtLjYgMC0uOC4zbC0yIDMuNWMtLjEuMi0uMS41LjEuN2wyLjEgMS42Yy0uMS42LS4xIDEuMyAwIDEuOWwtMi4xIDEuNmMtLjIuMi0uMy41LS4xLjdsMiAzLjVjLjIuMy41LjQuOC4zbDIuNS0xYzEuNS40IDEuMS43IDEuNyAxbC40IDIuNmMwIC4zLjMuNS42LjVoNGMuMyAwIC42LS4yLjYtLjVsLjQtMi42Yy42LS4zIDEuMi0uNiAxLjctMWwyLjUgMWMuMy4xLjYgMCAuOC0uM2wyLTMuNWMuMS0uMi4xLS41LS4xLS43bC0yLjEtMS42em0tNy40IDIuNWMtMS45IDAtMy41LTEuNi0zLjUtMy41czEuNi0zLjUgMy41LTMuNSAzLjUgMS42IDMuNSAzLjUtMS42IDMuNS0zLjUgMy41eiIvPjwvc3ZnPg==";
          
          try {
            player.addButton(
              gearSvg,
              "Quality",
              () => { document.getElementById('quality-selector').classList.toggle('show'); },
              "quality-settings-btn"
            );
          } catch(e) { console.log("Button API failed"); }
        });

        player.on('error', () => {
          showLoading(true, "Video Error! Check your link.");
        });

      } catch(err) {
        showLoading(true, "Script Error!");
      }
    }

    document.addEventListener('click', (e) => {
      const sel = document.getElementById('quality-selector');
      if(sel && sel.classList.contains('show') && !e.target.closest('.jw-button-color') && !sel.contains(e.target)) {
        sel.classList.remove('show');
      }
    });

    initPlayer();
  </script>
</body>
</html>
