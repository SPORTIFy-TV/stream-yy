<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Sports Player</title>

<link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script src="https://cdn.plyr.io/3.7.8/plyr.polyfilled.js"></script>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #000;
}
#playerWrapper {
  height: 100vh;
  width: 100%;
}
video {
  width: 100%;
  height: 100%;
  object-fit: contain;
  background: #000;
}
</style>
</head>

<body>

<div id="playerWrapper">
  <video id="player" controls playsinline autoplay></video>
</div>

<script>
const urlParams = new URLSearchParams(window.location.search);
const videoUrl = urlParams.get("url");

// 🔥 তোমার Proxy
const proxyBase = "https://mini.allinonereborn.fun/events/stream_proxy.php?url=";

const video = document.getElementById("player");

if (!videoUrl) {
  alert("No stream URL provided. Use ?url=YOUR_M3U8_LINK");
}

// Final proxied URL
const finalUrl = proxyBase + encodeURIComponent(videoUrl);

if (Hls.isSupported()) {

  const hls = new Hls({
    enableWorker: true,
    lowLatencyMode: true,
    maxBufferLength: 30,
    liveSyncDuration: 3,
    liveMaxLatencyDuration: 5
  });

  hls.loadSource(finalUrl);
  hls.attachMedia(video);

  hls.on(Hls.Events.MANIFEST_PARSED, function () {
    video.play();
  });

  hls.on(Hls.Events.ERROR, function(event, data) {
    console.log("HLS ERROR:", data);
  });

} else if (video.canPlayType('application/vnd.apple.mpegurl')) {
  video.src = finalUrl;
}

const player = new Plyr(video, {
  autoplay: true,
  controls: [
    'play-large',
    'play',
    'progress',
    'current-time',
    'mute',
    'volume',
    'settings',
    'fullscreen'
  ]
});
</script>

</body>
</html>
